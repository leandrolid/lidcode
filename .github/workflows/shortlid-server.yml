name: Shortlid Server Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - apps/shortlid-server/**
      - .github/workflows/shortlid-server.yml

jobs:
  build:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout GitHub
        uses: actions/checkout@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/shortlid-server/Dockerfile
          push: true
          tags: leandrolid/lidcode:shortlid-server-latest
      - name: Deploy to Heroku
        uses: ./.github/heroku
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          docker_image: leandrolid/lidcode:shortlid-server-latest
          heroku_app_name: shortlid-server
