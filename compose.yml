services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3333:3333"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:80"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
